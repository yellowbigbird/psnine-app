name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json'));
            app.expo.version = '${VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - run: npm ci

      - run: eas build --platform android --profile production --local --non-interactive --output ./build.apk

      - name: Upload APK to GitHub Release
        run: gh release upload "${{ steps.tag.outputs.name }}" ./build.apk#psnine-${{ steps.tag.outputs.name }}.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

